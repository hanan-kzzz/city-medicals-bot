<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Shop | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2dd4bf;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Abstract Moving Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 30px rgba(45, 212, 191, 0.3);
        }

        h2 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 2.5rem; }

        .input-group { position: relative; margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem; margin-left: 0.5rem; text-transform: uppercase; }
        
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.1); background: rgba(0, 0, 0, 0.4); }

        .login-btn {
            width: 100%;
            background: var(--primary);
            color: #020617;
            border: none;
            padding: 1rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 212, 191, 0.4);
            background: #fff;
        }

        .footer-note { margin-top: 2rem; font-size: 0.75rem; color: #475569; }
    </style>
</head>
<body>
    <div class="circle" style="width: 300px; height: 300px; background: #2dd4bf33; top: -100px; left: -100px;"></div>
    <div class="circle" style="width: 400px; height: 400px; background: #3b82f622; bottom: -150px; right: -150px;"></div>

    <div class="login-card">
        <div class="logo-box">🏥</div>
        <h2>Medical Shop</h2>
        <p>Dashboard Security Gateway</p>

        <form id="login-form">
            <div class="input-group">
                <label>System Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Secure Connection</button>
        </form>

        <p class="footer-note">Authorized Medical Access Only</p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Encode for Basic Auth
            const auth = btoa(user + ':' + pass);
            
            // Set as cookie or localStorage for the main page to use
            localStorage.setItem('medical_auth', auth);
            
            // Try to fetch main page (if credentials wrong, browser might still prompt, 
            // but we'll handle it nicely in the app.js)
            window.location.href = '/';
        });
    </script>
</body>
</html>
